<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EWheel · 个人主页</title>
    <meta name="description" content="EWheel 账号登录与作者编辑模式入口" />
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body data-page="profile">
    <header class="container header">
      <div class="brand">
        <img class="brand-mark" src="/assets/brand-logo.jpg" alt="EWheel 标识" />
        <div>
          <h1>EWheel</h1>
          <p class="subtitle">个人主页 · 登录与作者模式</p>
        </div>
      </div>
      <nav class="nav">
        <a href="/">主页</a>
        <a href="/1-64-alloy/">合金</a>
        <a href="/1-64-resin/">树脂</a>
        <a href="/profile/">个人</a>
      </nav>
    </header>

    <main class="container">
      <section class="card hero">
        <h2>账号登录</h2>
        <p class="muted">
          这里用“手机号 + 密码”登录（不走短信验证码）。登录后默认还是浏览者模式；在下方输入管理员
          code `911458` 后才会变成作者模式，才能编辑与上传。
        </p>
      </section>

      <section class="tools-grid">
        <section class="card">
          <h3>登录</h3>
          <form class="editor-form" id="login-form">
            <label class="field-label">
              手机号
              <input class="input" id="login-phone" type="text" placeholder="例如：13800138000" />
            </label>
            <label class="field-label">
              密码
              <input class="input" id="login-password" type="password" placeholder="至少 6 位" />
            </label>
            <div class="form-actions">
              <button class="btn" type="submit">登录</button>
              <button class="btn-secondary" type="button" id="logout-btn">退出登录</button>
            </div>
          </form>
          <p class="tip" id="login-tip"></p>
        </section>

        <section class="card">
          <h3>注册</h3>
          <form class="editor-form" id="register-form">
            <label class="field-label">
              手机号
              <input class="input" id="register-phone" type="text" placeholder="例如：13800138000" />
            </label>
            <label class="field-label">
              密码
              <input class="input" id="register-password" type="password" placeholder="至少 6 位" />
            </label>
            <div class="form-actions">
              <button class="btn" type="submit">注册</button>
            </div>
          </form>
          <p class="tip" id="register-tip"></p>
        </section>
      </section>

      <section class="card stack-card">
        <h3>我的状态</h3>
        <div class="entry-list" id="me-box"></div>
      </section>

      <section class="card stack-card" id="upgrade-card">
        <h3>开启作者编辑模式</h3>
        <p class="muted">输入管理员 code：`911458`。任何已登录账号都可以用它升级为作者（请勿外传）。</p>
        <form class="editor-form" id="upgrade-form">
          <label class="field-label">
            管理员 code
            <input class="input" id="admin-code" type="password" placeholder="请输入 911458" />
          </label>
          <div class="form-actions">
            <button class="btn" type="submit">开启作者模式</button>
          </div>
        </form>
        <p class="tip" id="upgrade-tip"></p>
      </section>
    </main>

    <footer class="container footer">
      <p class="muted">© <span data-current-year></span> EWheel</p>
    </footer>

    <script src="/assets/site.js"></script>
  </body>
</html>
